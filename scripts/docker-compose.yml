services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: uverify
      POSTGRES_PASSWORD: your_uverify_db_password
      POSTGRES_DB: uverify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  uverify-backend:
    image: uverify/uverify-backend:latest
    container_name: uverify-backend
    restart: always
    environment:
      PORT: 9090

      SPRING_ACTIVE_PROFILES: postgres,preprod
      DB_URL: jdbc:postgresql://postgres:5432/uverify
      DB_USERNAME: uverify
      DB_PASSWORD: your_uverify_db_password

      CARDANO_NETWORK: PREPROD
      BLOCKFROST_PROJECT_ID: <YOUR BLOCKFROST PREPROD PROJECT ID>
      BLOCKFROST_BASE_URL: https://cardano-preprod.blockfrost.io/api/v0/

      CONNECTED_GOODS_EXTENSION_ENABLED: false
      TADAMON_EXTENSION_ENABLED: false 
      # SERVICE_USER_ADDRESS: Override only if using a custom service address.
      #   The network default is baked into application.yml per profile.

      # FACILITATOR_ACCOUNT_MNEMONIC: Add your *optional* facilitator mnemonic here
      # The facilitator is used to sign rest requests, ensuring that the request is coming from a trusted source.
      # This account is not used for any other purpose and will be grenerated by the backend if not provided.
    depends_on:
      - postgres
    ports:
      - "9090:9090"

  uverify-ui:
    image: uverify/uverify-ui:latest
    container_name: uverify-ui
    restart: always
    environment:
      VITE_BACKEND_URL: http://uverify-backend:9090
      VITE_CARDANO_NETWORK: preprod
    depends_on:
      - uverify-backend
    ports:
      - "3000:80"

  # nginx:
  #   image: nginx:latest
  #   container_name: nginx
  #   restart: always
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./certs:/etc/letsencrypt
  #   ports:
  #     - "443:443"
  #   depends_on:
  #     - uverify-ui

volumes:
  postgres_data:
